# ==== Servidor ====
server.port=8080

# ==== Banco de dados (MySQL) ====
# createDatabaseIfNotExist=true cria o schema "reservas" automaticamente no primeiro boot.
# Usuario/senha vem das variaveis de ambiente DB_USER/DB_PASSWORD (padrao: root/root).
spring.datasource.url=jdbc:mysql://localhost:3306/reservas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# ==== JPA / Hibernate ====
# update: mantem os dados entre reinicios (nao apaga as tabelas).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Roda o data.sql (seed) DEPOIS que o Hibernate cria as tabelas.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ==== JSON ====
spring.jackson.serialization.write-dates-as-timestamps=false

# ==== Autenticacao (JWT) ====
# Em producao, defina JWT_SECRET no ambiente (minimo 32 caracteres para HS256).
app.jwt.secret=${JWT_SECRET:reservas-dev-secret-troque-em-producao-0123456789}
app.jwt.expiracao-horas=8
