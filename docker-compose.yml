services:
  mysql:
    image: mysql:8.4
    container_name: reservas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reservas
    ports:
      - "3306:3306"
    volumes:
      - reservas_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  reservas_mysql_data:
