<section class="grid-2-rev" aria-label="Restaurantes">
  <aside class="card">
    <h2 style="font-size:18px;margin-bottom:16px">Novo restaurante</h2>
    <form class="stack" (ngSubmit)="criar()">
      <label class="field">Nome<input class="input" [class.invalid]="!!erroNome()" type="text" name="nome" [(ngModel)]="nome" required /></label>
      @if (erroNome()) { <div class="err">{{ erroNome() }}</div> }
      <label class="field">Endereço<input class="input" type="text" name="endereco" [(ngModel)]="endereco" /></label>
      <label class="field">Telefone<input class="input" type="text" name="telefone" [(ngModel)]="telefone" /></label>
      <button class="btn btn-primary" type="submit">Criar</button>
    </form>
  </aside>
  <div style="min-width:0">
    <h1 style="font-size:24px;margin-bottom:16px">Restaurantes</h1>
    <div class="stack">
      @for (r of restAtivo.restaurantes(); track r.id) {
        <div style="display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;animation:fadeUp .25s ease"
             [style.borderColor]="r.id === restAtivo.ativoId() ? 'var(--accent)' : 'var(--border)'">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:9px">
              <span style="font-family:var(--serif);font-size:17px;font-weight:600">{{ r.nome }}</span>
              @if (r.id === restAtivo.ativoId()) {
                <span style="font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:999px;background:color-mix(in oklab,var(--accent) 16%,transparent);color:var(--accent)">ATIVO</span>
              }
            </div>
            <div class="muted" style="font-size:13px;margin-top:4px">{{ r.endereco }} · {{ r.telefone }}</div>
          </div>
          @if (r.id !== restAtivo.ativoId()) {
            <button class="btn btn-ghost btn-sm" (click)="selecionar(r)">Tornar ativo</button>
          }
        </div>
      }
    </div>
  </div>
</section>
