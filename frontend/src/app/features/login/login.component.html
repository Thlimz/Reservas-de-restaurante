<div style="min-height:100dvh;display:grid;place-items:center;padding:24px">
  <div style="width:100%;max-width:400px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:26px">
      <div style="width:52px;height:52px;border-radius:14px;background:var(--accent);display:grid;place-items:center;color:var(--accent-ink);font-family:var(--serif);font-weight:700;font-size:27px">R</div>
      <div style="text-align:center">
        <div style="font-family:var(--serif);font-size:26px;font-weight:600;line-height:1.15">Mesa &amp; Hora</div>
        <div style="font-size:11.5px;color:var(--muted);letter-spacing:.06em;margin-top:3px">GESTÃO DE RESERVAS</div>
      </div>
    </div>

    <div class="card">
      <h1 style="font-size:19px;margin-bottom:4px">Entrar</h1>
      <p class="muted" style="font-size:13.5px;margin-bottom:18px">Acesse com o login do seu restaurante.</p>

      <form class="stack" (ngSubmit)="entrar()">
        <label class="field">Usuário
          <input class="input" type="text" name="username" [(ngModel)]="username"
                 autocomplete="username" autofocus [disabled]="carregando()" />
        </label>
        <label class="field">Senha
          <input class="input" type="password" name="senha" [(ngModel)]="senha"
                 autocomplete="current-password" [disabled]="carregando()" />
        </label>

        @if (erro()) {
          <div class="err" role="alert" aria-live="assertive">{{ erro() }}</div>
        }

        <button class="btn btn-primary" type="submit" [disabled]="carregando()" style="width:100%">
          {{ carregando() ? 'Entrando…' : 'Entrar' }}
        </button>
      </form>
    </div>

    <p class="muted" style="text-align:center;font-size:12px;margin-top:18px">
      Não tem acesso? Fale com o administrador do sistema.
    </p>
  </div>
</div>
