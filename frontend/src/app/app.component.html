<header style="position:sticky;top:0;z-index:20;background:color-mix(in oklab,var(--bg) 82%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)">
  <div style="max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:11px;margin-right:auto">
      <div style="width:34px;height:34px;border-radius:10px;background:var(--accent);display:grid;place-items:center;color:var(--accent-ink);font-family:var(--serif);font-weight:700;font-size:18px">R</div>
      <div>
        <div style="font-family:var(--serif);font-size:18px;font-weight:600;line-height:1">Mesa &amp; Hora</div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:.04em">GESTÃO DE RESERVAS</div>
      </div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:600">
      Restaurante
      <select class="input" style="width:auto;margin-top:0" [value]="restAtivo.ativoId()" (change)="onRestauranteChange($any($event.target).value)" aria-label="Restaurante ativo">
        @for (r of restAtivo.restaurantes(); track r.id) {
          <option [value]="r.id">{{ r.nome }}</option>
        }
      </select>
    </label>
    <button class="btn btn-ghost" style="width:38px;height:38px;padding:0" (click)="toggleTheme()" aria-label="Alternar tema" title="Alternar tema">{{ theme() === 'dark' ? '\u2600' : '\u263E' }}</button>
  </div>
  <nav aria-label="Seções" style="max-width:1180px;margin:0 auto;padding:0 16px;display:flex;gap:2px;overflow-x:auto">
    @for (a of abas; track a.path) {
      <a [routerLink]="a.path" routerLinkActive="aba-ativa" #rla="routerLinkActive"
         [style.color]="rla.isActive ? 'var(--text)' : 'var(--muted)'"
         [style.borderBottom]="rla.isActive ? '2.5px solid var(--accent)' : '2.5px solid transparent'"
         style="padding:11px 15px;font-size:13.5px;font-weight:600;white-space:nowrap">{{ a.label }}</a>
    }
  </nav>
</header>

<main class="container">
  <router-outlet></router-outlet>
</main>

<app-toast></app-toast>
